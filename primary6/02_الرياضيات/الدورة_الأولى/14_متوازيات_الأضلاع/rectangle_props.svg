<svg viewBox="0 0 300 200" class="w-full max-w-[270px] mx-auto my-2" xmlns="http://www.w3.org/2000/svg">
  <rect x="50" y="40" width="200" height="120" fill="#1E104E" fill-opacity="0.08" stroke="#1E104E" stroke-width="2.5"/>

  <circle cx="50" cy="40" r="3" fill="#1E104E"/>
  <circle cx="250" cy="40" r="3" fill="#1E104E"/>
  <circle cx="250" cy="160" r="3" fill="#1E104E"/>
  <circle cx="50" cy="160" r="3" fill="#1E104E"/>

  <text x="38" y="32" font-size="13" fill="#1E104E" font-weight="bold" text-anchor="middle" dominant-baseline="central">A</text>
  <text x="262" y="32" font-size="13" fill="#1E104E" font-weight="bold" text-anchor="middle" dominant-baseline="central">B</text>
  <text x="262" y="175" font-size="13" fill="#1E104E" font-weight="bold" text-anchor="middle" dominant-baseline="central">C</text>
  <text x="38" y="175" font-size="13" fill="#1E104E" font-weight="bold" text-anchor="middle" dominant-baseline="central">D</text>

  <!-- Right angle marks -->
  <rect x="50" y="40" width="12" height="12" fill="none" stroke="#FF653F" stroke-width="2"/>
  <rect x="238" y="40" width="12" height="12" fill="none" stroke="#FF653F" stroke-width="2"/>
  <rect x="238" y="148" width="12" height="12" fill="none" stroke="#FF653F" stroke-width="2"/>
  <rect x="50" y="148" width="12" height="12" fill="none" stroke="#FF653F" stroke-width="2"/>

  <!-- Diagonals -->
  <line x1="50" y1="40" x2="250" y2="160" stroke="#6D28D9" stroke-width="1.5" stroke-dasharray="6,3"/>
  <line x1="250" y1="40" x2="50" y2="160" stroke="#6D28D9" stroke-width="1.5" stroke-dasharray="6,3"/>

  <circle cx="150" cy="100" r="3" fill="#6D28D9"/>

  <text x="130" y="75" font-size="10" fill="#6D28D9" font-weight="bold" text-anchor="middle" dominant-baseline="central">AC = BD</text>
</svg>