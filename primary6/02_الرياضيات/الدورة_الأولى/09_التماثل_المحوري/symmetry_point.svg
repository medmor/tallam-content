<svg viewBox="0 0 280 200" class="w-full max-w-[250px] mx-auto my-2" xmlns="http://www.w3.org/2000/svg">
  <!-- Axis of symmetry -->
  <line x1="140" y1="10" x2="140" y2="190" stroke="#6D28D9" stroke-width="2" stroke-dasharray="8,4"/>
  <text x="140" y="4" font-size="12" fill="#6D28D9" font-weight="bold" text-anchor="middle" dominant-baseline="central">(d)</text>

  <!-- Point M -->
  <circle cx="60" cy="100" r="4" fill="#1E104E"/>
  <text x="48" y="95" font-size="13" fill="#1E104E" font-weight="bold" text-anchor="middle" dominant-baseline="central">M</text>

  <!-- Point M' -->
  <circle cx="220" cy="100" r="4" fill="#FF653F"/>
  <text x="232" y="95" font-size="13" fill="#FF653F" font-weight="bold" text-anchor="middle" dominant-baseline="central">'M</text>

  <!-- Dashed line MM' -->
  <line x1="60" y1="100" x2="220" y2="100" stroke="#999" stroke-width="1" stroke-dasharray="4,3"/>

  <!-- Right angle mark at intersection with axis -->
  <rect x="140" y="90" width="10" height="10" fill="none" stroke="#6D28D9" stroke-width="1.5"/>

  <!-- Equal distance marks -->
  <text x="100" y="92" font-size="12" fill="#1E104E" font-weight="bold" text-anchor="middle" dominant-baseline="central">∥</text>
  <text x="180" y="92" font-size="12" fill="#FF653F" font-weight="bold" text-anchor="middle" dominant-baseline="central">∥</text>
</svg>