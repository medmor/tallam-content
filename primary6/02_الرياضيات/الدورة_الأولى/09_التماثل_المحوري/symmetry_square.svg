<svg viewBox="0 0 320 200" class="w-full max-w-[280px] mx-auto my-2" xmlns="http://www.w3.org/2000/svg">
  <!-- Axis of symmetry -->
  <line x1="160" y1="15" x2="160" y2="190" stroke="#6D28D9" stroke-width="2" stroke-dasharray="8,4"/>
  <text x="160" y="8" font-size="12" fill="#6D28D9" font-weight="bold" text-anchor="middle" dominant-baseline="central">(d)</text>

  <!-- Original square ABCD -->
  <polygon points="70,140 70,60 120,60 120,140" fill="#1E104E" fill-opacity="0.1" stroke="#1E104E" stroke-width="2"/>
  <text x="60" y="148" font-size="12" fill="#1E104E" font-weight="bold" text-anchor="middle" dominant-baseline="central">A</text>
  <text x="60" y="52" font-size="12" fill="#1E104E" font-weight="bold" text-anchor="middle" dominant-baseline="central">B</text>
  <text x="128" y="52" font-size="12" fill="#1E104E" font-weight="bold" text-anchor="middle" dominant-baseline="central">C</text>
  <text x="128" y="148" font-size="12" fill="#1E104E" font-weight="bold" text-anchor="middle" dominant-baseline="central">D</text>

  <!-- Symmetric square A'B'C'D' -->
  <polygon points="250,140 250,60 200,60 200,140" fill="#FF653F" fill-opacity="0.1" stroke="#FF653F" stroke-width="2"/>
  <text x="260" y="148" font-size="12" fill="#FF653F" font-weight="bold" text-anchor="middle" dominant-baseline="central">'A</text>
  <text x="260" y="52" font-size="12" fill="#FF653F" font-weight="bold" text-anchor="middle" dominant-baseline="central">'B</text>
  <text x="192" y="52" font-size="12" fill="#FF653F" font-weight="bold" text-anchor="middle" dominant-baseline="central">'C</text>
  <text x="192" y="148" font-size="12" fill="#FF653F" font-weight="bold" text-anchor="middle" dominant-baseline="central">'D</text>

  <!-- Dashed lines connecting corresponding points -->
  <line x1="70" y1="140" x2="250" y2="140" stroke="#999" stroke-width="1" stroke-dasharray="4,3"/>
  <line x1="70" y1="60" x2="250" y2="60" stroke="#999" stroke-width="1" stroke-dasharray="4,3"/>
  <line x1="120" y1="60" x2="200" y2="60" stroke="#999" stroke-width="1" stroke-dasharray="4,3"/>
  <line x1="120" y1="140" x2="200" y2="140" stroke="#999" stroke-width="1" stroke-dasharray="4,3"/>
</svg>