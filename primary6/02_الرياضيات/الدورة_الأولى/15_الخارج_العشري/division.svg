  <text x="135" y="243" font-size="20" fill="white" font-family="monospace, Courier New" text-anchor="middle" dominant-baseline="central">3</text>
  <text x="160" y="243" font-size="20" fill="white" font-family="monospace, Courier New" text-anchor="middle" dominant-baseline="central">4</text>

