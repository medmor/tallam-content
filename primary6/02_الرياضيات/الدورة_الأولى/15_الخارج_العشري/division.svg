  <!-- Labels -->
  <text x="145" y="320" font-size="11" fill="white" opacity="0.7" text-anchor="middle" dominant-baseline="central">456 ÷ 17 = 26,82</text>
  <text x="145" y="340" font-size="11" fill="white" opacity="0.7" text-anchor="middle" dominant-baseline="central">الباقي = 6 ≠ 0 ← خارج مقرب</text>
  <text x="145" y="360" font-size="11" fill="#FFD700" opacity="0.9" text-anchor="middle" dominant-baseline="central">التقريب بتفريط إلى 0,01 = 26,82</text>
</svg>