  <!-- Divisor: 17 top right -->
  <text x="260" y="22" font-size="22" fill="white" font-family="monospace, Courier New" font-weight="bold" text-anchor="middle" dominant-baseline="central">17</text>

  <!-- Quotient: 26,82 bottom right with comma highlighted -->
  <text x="225" y="55" font-size="22" fill="#FFD700" font-family="monospace, Courier New" font-weight="bold" text-anchor="middle" dominant-baseline="central">2</text>
  <text x="250" y="55" font-size="22" fill="#FFD700" font-family="monospace, Courier New" font-weight="bold" text-anchor="middle" dominant-baseline="central">6</text>
  <text x="270" y="55" font-size="20" fill="#FFD700" font-family="monospace, Courier New" font-weight="bold" text-anchor="middle" dominant-baseline="central">,</text>
  <text x="295" y="55" font-size="22" fill="#FFD700" font-family="monospace, Courier New" font-weight="bold" text-anchor="middle" dominant-baseline="central">8</text>
  <text x="320" y="55" font-size="22" fill="#FFD700" font-family="monospace, Courier New" font-weight="bold" text-anchor="middle" dominant-baseline="central">2</text>

  <!-- Step 1: 34 below 45 -->
  <text x="30" y="60" font-size="20" fill="white" font-family="monospace, Courier New" text-anchor="middle" dominant-baseline="central">3</text>
  <text x="65" y="60" font-size="20" fill="white" font-family="monospace, Courier New" text-anchor="middle" dominant-baseline="central">4</text>

  <!-- Line under 34 -->
  <line x1="10" y1="72" x2="165" y2="72" stroke="white" stroke-width="1.5"/>

  <!-- Step 2: 116 result -->
  <text x="30" y="92" font-size="20" fill="white" font-family="monospace, Courier New" text-anchor="middle" dominant-baseline="central">1</text>
  <text x="65" y="92" font-size="20" fill="white" font-family="monospace, Courier New" text-anchor="middle" dominant-baseline="central">1</text>
  <text x="100" y="92" font-size="20" fill="white" font-family="monospace, Courier New" text-anchor="middle" dominant-baseline="central">6</text>

  <!-- 102 below 116 -->
  <text x="30" y="120" font-size="20" fill="white" font-family="monospace, Courier New" text-anchor="middle" dominant-baseline="central">1</text>
  <text x="65" y="120" font-size="20" fill="white" font-family="monospace, Courier New" text-anchor="middle" dominant-baseline="central">0</text>
  <text x="100" y="120" font-size="20" fill="white" font-family="monospace, Courier New" text-anchor="middle" dominant-baseline="central">2</text>

