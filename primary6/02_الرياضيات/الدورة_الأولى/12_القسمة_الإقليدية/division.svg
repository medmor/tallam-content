  <text x="38" y="40" font-size="26" fill="white" font-family="monospace, Courier New" text-anchor="middle" dominant-baseline="central">20</text>

  <!-- Horizontal line after divisor -->
  <line x1="68" y1="55" x2="260" y2="55" stroke="white" stroke-width="2.5"/>

  <!-- Dividend: 5789 (below the line, left side) -->
