<svg viewBox="0 0 300 220" class="w-full max-w-[280px] mx-auto my-2" xmlns="http://www.w3.org/2000/svg">
  <rect x="0" y="0" width="300" height="220" fill="#2D8B4E" rx="8"/>

  <!-- Step 1: Right angle at A (appear at 5%, stay) -->
  <path d="M 45 148 L 57 148 L 57 160" fill="none" stroke="#FFFFFF" stroke-width="1.5" opacity="0">
    <animate attributeName="opacity" values="0;0;1;1" keyTimes="0;0.05;0.08;1" dur="10s" repeatCount="indefinite"/>
  </path>
  <text x="65" y="145" font-size="10" fill="#FFD700" font-weight="bold" opacity="0">90°
    <animate attributeName="opacity" values="0;0;1;1" keyTimes="0;0.05;0.08;1" dur="10s" repeatCount="indefinite"/>
  </text>

  <!-- Point A -->
  <circle cx="45" cy="160" r="4" fill="#ffffff" opacity="0">
    <animate attributeName="opacity" values="0;0;1;1" keyTimes="0;0.05;0.08;1" dur="10s" repeatCount="indefinite"/>
  </circle>
  <text x="35" y="176" font-size="13" fill="#FFFFFF" font-weight="bold" text-anchor="middle" opacity="0">A
    <animate attributeName="opacity" values="0;0;1;1" keyTimes="0;0.05;0.08;1" dur="10s" repeatCount="indefinite"/>
  </text>

  <!-- Step 2: AB = 4 cm (draw from 8% to 24%) -->
  <line x1="45" y1="160" x2="205" y2="160" stroke="white" stroke-width="2.5" stroke-dasharray="160" stroke-dashoffset="160">
    <animate attributeName="stroke-dashoffset" values="160;160;0;0" keyTimes="0;0.08;0.24;1" dur="10s" repeatCount="indefinite"/>
  </line>
  <!-- AB label -->
  <text x="125" y="180" font-size="11" fill="white" opacity="0.8" text-anchor="middle" opacity="0">AB = 4 cm
    <animate attributeName="opacity" values="0;0;0.8;0.8" keyTimes="0;0.24;0.28;1" dur="10s" repeatCount="indefinite"/>
  </text>
  <!-- Point B -->
  <circle cx="205" cy="160" r="4" fill="#FFFFFF" opacity="0">
    <animate attributeName="opacity" values="0;0;1;1" keyTimes="0;0.24;0.28;1" dur="10s" repeatCount="indefinite"/>
  </circle>
  <text x="215" y="176" font-size="13" fill="#FFFFFF" font-weight="bold" text-anchor="middle" opacity="0">B
    <animate attributeName="opacity" values="0;0;1;1" keyTimes="0;0.24;0.28;1" dur="10s" repeatCount="indefinite"/>
  </text>

  <!-- Step 3: AD = 2 cm (draw from 28% to 44%) -->
  <line x1="45" y1="160" x2="45" y2="80" stroke="white" stroke-width="2.5" stroke-dasharray="80" stroke-dashoffset="80">
    <animate attributeName="stroke-dashoffset" values="80;80;0;0" keyTimes="0;0.28;0.44;1" dur="10s" repeatCount="indefinite"/>
  </line>
  <!-- AD label -->
  <text x="30" y="130" font-size="11" fill="white" opacity="0.8" text-anchor="middle" transform="rotate(-90, 25, 125)" opacity="0">AD = 2 cm
    <animate attributeName="opacity" values="0;0;0.8;0.8" keyTimes="0;0.44;0.48;1" dur="10s" repeatCount="indefinite"/>
  </text>
  <!-- Point D -->
  <circle cx="45" cy="80" r="4" fill="white" opacity="0">
    <animate attributeName="opacity" values="0;0;1;1" keyTimes="0;0.44;0.48;1" dur="10s" repeatCount="indefinite"/>
  </circle>
  <text x="35" y="74" font-size="13" fill="white" font-weight="bold" text-anchor="middle" opacity="0">D
    <animate attributeName="opacity" values="0;0;1;1" keyTimes="0;0.44;0.48;1" dur="10s" repeatCount="indefinite"/>
  </text>

  <!-- Step 4: DC = 5 cm (draw from 48% to 64%) -->
  <line x1="45" y1="80" x2="245" y2="80" stroke="white" stroke-width="2.5" stroke-dasharray="200" stroke-dashoffset="200">
    <animate attributeName="stroke-dashoffset" values="200;200;0;0" keyTimes="0;0.48;0.64;1" dur="10s" repeatCount="indefinite"/>
  </line>
  <!-- DC label -->
  <text x="145" y="74" font-size="11" fill="white" opacity="0.8" text-anchor="middle" opacity="0">DC = 5 cm
    <animate attributeName="opacity" values="0;0;0.8;0.8" keyTimes="0;0.64;0.68;1" dur="10s" repeatCount="indefinite"/>
  </text>
  <!-- Point C -->
  <circle cx="245" cy="80" r="4" fill="white" opacity="0">
    <animate attributeName="opacity" values="0;0;1;1" keyTimes="0;0.64;0.68;1" dur="10s" repeatCount="indefinite"/>
  </circle>
  <text x="255" y="76" font-size="13" fill="white" font-weight="bold" opacity="0">C
    <animate attributeName="opacity" values="0;0;1;1" keyTimes="0;0.64;0.68;1" dur="10s" repeatCount="indefinite"/>
  </text>

  <!-- Step 5: Connect C to B (draw from 68% to 84%) -->
  <line x1="245" y1="80" x2="205" y2="160" stroke="white" stroke-width="2.5" stroke-dasharray="90" stroke-dashoffset="90">
    <animate attributeName="stroke-dashoffset" values="90;90;0;0" keyTimes="0;0.68;0.84;1" dur="10s" repeatCount="indefinite"/>
  </line>
</svg>