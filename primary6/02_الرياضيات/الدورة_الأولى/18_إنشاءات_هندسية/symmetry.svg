<svg viewBox="0 0 340 240" class="w-full max-w-[320px] mx-auto my-2" xmlns="http://www.w3.org/2000/svg">
  <rect x="0" y="0" width="340" height="240" fill="#2D8B4E" rx="8"/>

  <!-- Axis of symmetry (D) -->
  <line x1="170" y1="10" x2="170" y2="230" stroke="#FFD700" stroke-width="2" stroke-dasharray="6 3"/>
  <text x="178" y="20" font-size="12" fill="#FFD700" font-weight="bold">(D)</text>

  <!-- Shape F1 (left) - a house shape -->
  <polygon points="60,180 60,100 100,60 140,100 140,180" fill="rgba(255,255,255,0.1)" stroke="white" stroke-width="2"/>

  <!-- Shape F2 (right) - mirror of F1 -->
  <polygon points="200,180 200,100 240,60 280,100 280,180" fill="rgba(255,101,63,0.1)" stroke="#FF653F" stroke-width="2"/>

  <!-- Matching points -->
  <circle cx="60" cy="180" r="3" fill="white"/>
  <circle cx="60" cy="100" r="3" fill="white"/>
  <circle cx="100" cy="60" r="3" fill="white"/>
  <circle cx="140" cy="100" r="3" fill="white"/>
  <circle cx="140" cy="180" r="3" fill="white"/>

  <circle cx="200" cy="180" r="3" fill="#FF653F"/>
  <circle cx="200" cy="100" r="3" fill="#FF653F"/>
  <circle cx="240" cy="60" r="3" fill="#FF653F"/>
  <circle cx="280" cy="100" r="3" fill="#FF653F"/>
  <circle cx="280" cy="180" r="3" fill="#FF653F"/>

  <!-- Labels -->
  <text x="50" y="195" font-size="11" fill="white" font-weight="bold">(F1)</text>
  <text x="275" y="195" font-size="11" fill="#FF653F" font-weight="bold">(F2)</text>

  <!-- Bottom text -->
  <text x="170" y="228" font-size="11" fill="white" opacity="0.9" text-anchor="middle">(F1) و (F2) متماثلان بالنسبة لـ (D)</text>
</svg>