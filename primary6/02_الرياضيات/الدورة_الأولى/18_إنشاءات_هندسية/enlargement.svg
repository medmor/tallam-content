<svg viewBox="0 0 340 240" class="w-full max-w-[320px] mx-auto my-2" xmlns="http://www.w3.org/2000/svg">
  <rect x="0" y="0" width="340" height="240" fill="#1E104E" rx="8"/>

  <!-- Shape G1 (small) -->
  <rect x="50" y="60" width="40" height="30" fill="rgba(255,255,255,0.15)" stroke="white" stroke-width="2"/>
  <text x="50" y="108" font-size="10" fill="white" font-weight="bold">(G1)</text>

  <!-- Arrow with scale factor -->
  <line x1="100" y1="75" x2="140" y2="130" stroke="#FFD700" stroke-width="2"/>
  <polygon points="140,130 135,118 145,122" fill="#FFD700"/>
  <text x="130" y="105" font-size="11" fill="#FFD700" font-weight="bold">×2</text>

  <!-- Shape G2 (large, 2x scale) -->
  <rect x="150" y="50" width="80" height="60" fill="rgba(255,101,63,0.15)" stroke="#FF653F" stroke-width="2"/>
  <text x="150" y="128" font-size="10" fill="#FF653F" font-weight="bold">(G2)</text>

  <!-- Properties box -->
  <rect x="10" y="148" width="320" height="80" fill="rgba(255,255,255,0.08)" rx="6"/>

  <text x="30" y="170" font-size="12" fill="white" font-weight="bold">خواص التكبير (معامل 2):</text>
  <text x="30" y="190" font-size="11" fill="#10b981">✓ الزوايا المتناظرة متقايسة</text>
  <text x="30" y="208" font-size="11" fill="#FF653F">✓ مساحة (G1) = ربع مساحة (G2)</text>
  <text x="30" y="224" font-size="11" fill="#FFD700">✓ محيط (G1) = نصف محيط (G2)</text>
</svg>