<svg viewBox="0 0 280 220" class="w-full max-w-[260px] mx-auto my-2" xmlns="http://www.w3.org/2000/svg">
  <rect x="0" y="0" width="280" height="220" fill="#2D8B4E" rx="8"/>

  <!-- Shape centered: A(58,150), B(103,72), D(178,150), C(223,72) -->
  <!-- Center is ~(140,111) which is centered in 280x220 -->

  <!-- Step 1: Angle arc at A -->
  <!-- Arc from AD direction to AB direction at A(58,150), radius 25 -->
  <path d="M 83 150 A 25 25 0 0 0 71 128" fill="none" stroke="#FFD700" stroke-width="2" opacity="0">
    <animate attributeName="opacity" values="0;0;1;1" keyTimes="0;0.05;0.10;1" dur="10s" repeatCount="indefinite"/>
  </path>
  <text x="86" y="142" font-size="11" fill="#FFD700" font-weight="bold" opacity="0">60°
    <animate attributeName="opacity" values="0;0;1;1" keyTimes="0;0.05;0.10;1" dur="10s" repeatCount="indefinite"/>
  </text>

  <!-- Point A -->
  <circle cx="58" cy="150" r="4" fill="#FFD700" opacity="0">
    <animate attributeName="opacity" values="0;0;1;1" keyTimes="0;0.05;0.10;1" dur="10s" repeatCount="indefinite"/>
  </circle>
  <text x="46" y="164" font-size="13" fill="#FFD700" font-weight="bold" opacity="0">A
    <animate attributeName="opacity" values="0;0;1;1" keyTimes="0;0.05;0.10;1" dur="10s" repeatCount="indefinite"/>
  </text>

  <!-- Step 2: Draw AB = 3 cm (10→25%) -->
  <line x1="58" y1="150" x2="103" y2="72" stroke="white" stroke-width="2.5" stroke-dasharray="90" stroke-dashoffset="90">
    <animate attributeName="stroke-dashoffset" values="90;90;0;0" keyTimes="0;0.10;0.25;1" dur="10s" repeatCount="indefinite"/>
  </line>
  <text x="40" y="106" font-size="11" fill="white" opacity="0" text-anchor="middle">AB = 3 cm
    <animate attributeName="opacity" values="0;0;0.8;0.8" keyTimes="0;0.25;0.30;1" dur="10s" repeatCount="indefinite"/>
  </text>
  <circle cx="103" cy="72" r="4" fill="white" opacity="0">
    <animate attributeName="opacity" values="0;0;1;1" keyTimes="0;0.25;0.30;1" dur="10s" repeatCount="indefinite"/>
  </circle>
  <text x="111" y="68" font-size="13" fill="white" font-weight="bold" opacity="0">B
    <animate attributeName="opacity" values="0;0;1;1" keyTimes="0;0.25;0.30;1" dur="10s" repeatCount="indefinite"/>
  </text>

  <!-- Step 3: Draw AD = 4 cm (10→25%) -->
  <line x1="58" y1="150" x2="178" y2="150" stroke="white" stroke-width="2.5" stroke-dasharray="120" stroke-dashoffset="120">
    <animate attributeName="stroke-dashoffset" values="120;120;0;0" keyTimes="0;0.10;0.25;1" dur="10s" repeatCount="indefinite"/>
  </line>
  <text x="118" y="168" font-size="11" fill="white" opacity="0.8" text-anchor="middle" opacity="0">AD = 4 cm
    <animate attributeName="opacity" values="0;0;0.8;0.8" keyTimes="0;0.25;0.30;1" dur="10s" repeatCount="indefinite"/>
  </text>
  <circle cx="178" cy="150" r="4" fill="white" opacity="0">
    <animate attributeName="opacity" values="0;0;1;1" keyTimes="0;0.25;0.30;1" dur="10s" repeatCount="indefinite"/>
  </circle>
  <text x="186" y="164" font-size="13" fill="white" font-weight="bold" opacity="0">D
    <animate attributeName="opacity" values="0;0;1;1" keyTimes="0;0.25;0.30;1" dur="10s" repeatCount="indefinite"/>
  </text>

  <!-- Step 4: Draw BC parallel to AD (30→50%) -->
  <line x1="103" y1="72" x2="223" y2="72" stroke="white" stroke-width="2.5" stroke-dasharray="120" stroke-dashoffset="120">
    <animate attributeName="stroke-dashoffset" values="120;120;0;0" keyTimes="0;0.30;0.50;1" dur="10s" repeatCount="indefinite"/>
  </line>

  <!-- Step 5: Draw DC parallel to AB (50→70%) -->
  <line x1="178" y1="150" x2="223" y2="72" stroke="white" stroke-width="2.5" stroke-dasharray="90" stroke-dashoffset="90">
    <animate attributeName="stroke-dashoffset" values="90;90;0;0" keyTimes="0;0.50;0.70;1" dur="10s" repeatCount="indefinite"/>
  </line>

  <!-- Point C (70%) -->
  <circle cx="223" cy="72" r="4" fill="white" opacity="0">
    <animate attributeName="opacity" values="0;0;1;1" keyTimes="0;0.70;0.75;1" dur="10s" repeatCount="indefinite"/>
  </circle>
  <text x="231" y="68" font-size="13" fill="white" font-weight="bold" opacity="0">C
    <animate attributeName="opacity" values="0;0;1;1" keyTimes="0;0.70;0.75;1" dur="10s" repeatCount="indefinite"/>
  </text>

  <!-- Parallel marks (75%) -->
  <line x1="77" y1="107" x2="84" y2="114" stroke="white" stroke-width="1.5" opacity="0">
    <animate attributeName="opacity" values="0;0;1;1" keyTimes="0;0.75;0.80;1" dur="10s" repeatCount="indefinite"/>
  </line>
  <line x1="197" y1="107" x2="204" y2="114" stroke="white" stroke-width="1.5" opacity="0">
    <animate attributeName="opacity" values="0;0;1;1" keyTimes="0;0.75;0.80;1" dur="10s" repeatCount="indefinite"/>
  </line>
  <line x1="115" y1="146" x2="121" y2="154" stroke="white" stroke-width="1.5" opacity="0">
    <animate attributeName="opacity" values="0;0;1;1" keyTimes="0;0.75;0.80;1" dur="10s" repeatCount="indefinite"/>
  </line>
  <line x1="120" y1="146" x2="126" y2="154" stroke="white" stroke-width="1.5" opacity="0">
    <animate attributeName="opacity" values="0;0;1;1" keyTimes="0;0.75;0.80;1" dur="10s" repeatCount="indefinite"/>
  </line>
  <line x1="160" y1="68" x2="166" y2="76" stroke="white" stroke-width="1.5" opacity="0">
    <animate attributeName="opacity" values="0;0;1;1" keyTimes="0;0.75;0.80;1" dur="10s" repeatCount="indefinite"/>
  </line>
  <line x1="165" y1="68" x2="171" y2="76" stroke="white" stroke-width="1.5" opacity="0">
    <animate attributeName="opacity" values="0;0;1;1" keyTimes="0;0.75;0.80;1" dur="10s" repeatCount="indefinite"/>
  </line>
</svg>