<svg viewBox="0 0 320 260" class="w-full max-w-[300px] mx-auto my-2" xmlns="http://www.w3.org/2000/svg">
  <rect x="0" y="0" width="320" height="260" fill="#2D8B4E" rx="8"/>

  <!-- Circle -->
  <circle cx="160" cy="130" r="90" fill="none" stroke="white" stroke-width="2.5"/>

  <!-- Center point O -->
  <circle cx="160" cy="130" r="4" fill="#FFD700"/>

  <!-- Point M on circle (top) -->
  <circle cx="160" cy="40" r="4" fill="white"/>
  <!-- Radius line O to M -->
  <line x1="160" y1="130" x2="160" y2="40" stroke="#FFD700" stroke-width="2" stroke-dasharray="6 3"/>

  <!-- Point E inside circle -->
  <circle cx="190" cy="110" r="4" fill="#10b981"/>
  <!-- Point F outside circle -->
  <circle cx="280" cy="80" r="4" fill="#FF653F"/>

  <!-- Labels -->
  <text x="160" y="30" font-size="14" fill="white" font-weight="bold" text-anchor="middle">M</text>
  <text x="150" y="145" font-size="14" fill="#FFD700" font-weight="bold" text-anchor="middle">O</text>
  <text x="200" y="108" font-size="14" fill="#10b981" font-weight="bold" text-anchor="middle">E</text>
  <text x="290" y="78" font-size="14" fill="#FF653F" font-weight="bold" text-anchor="middle">F</text>

  <!-- Radius label -->
  <text x="170" y="90" font-size="13" fill="#FFD700" font-weight="bold" text-anchor="middle">r</text>

  <!-- Bottom label -->
  <text x="160" y="235" font-size="12" fill="white" opacity="0.9" text-anchor="middle">(C) : OM = r</text>
  <text x="160" y="250" font-size="11" fill="white" opacity="0.7" text-anchor="middle">M على الدائرة، E داخلها، F خارجها</text>
</svg>