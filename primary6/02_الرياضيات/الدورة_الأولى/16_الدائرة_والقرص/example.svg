<svg viewBox="0 0 380 320" class="w-full max-w-[360px] mx-auto my-2" xmlns="http://www.w3.org/2000/svg">
  <rect x="0" y="0" width="380" height="320" fill="#1E104E" rx="8"/>

  <!-- Title -->
  <text x="190" y="30" font-size="16" fill="#FFD700" font-weight="bold" text-anchor="middle">مثال: دائرة شعاعها r = 5 cm</text>

  <!-- Circle -->
  <circle cx="190" cy="140" r="70" fill="none" stroke="white" stroke-width="2"/>

  <!-- Center O -->
  <circle cx="190" cy="140" r="3" fill="#FFD700"/>

  <!-- Radius line -->
  <line x1="190" y1="140" x2="260" y2="140" stroke="#FFD700" stroke-width="2"/>

  <!-- r=5 label -->
  <text x="228" y="133" font-size="13" fill="#FFD700" font-weight="bold">r = 5</text>

  <!-- Diameter line -->
  <line x1="120" y1="140" x2="260" y2="140" stroke="white" stroke-width="1" opacity="0.4"/>

  <!-- Perimeter result box -->
  <rect x="20" y="230" width="160" height="70" fill="rgba(255,255,255,0.1)" rx="6"/>
  <text x="100" y="252" font-size="12" fill="white" font-weight="bold" text-anchor="middle">محيط الدائرة</text>
  <text x="100" y="272" font-size="13" fill="#FFD700" font-family="monospace" font-weight="bold" text-anchor="middle">P = 2 × 5 × 3,14</text>
  <text x="100" y="292" font-size="14" fill="#10b981" font-family="monospace" font-weight="bold" text-anchor="middle">P = 31,4 cm</text>

  <!-- Area result box -->
  <rect x="200" y="230" width="160" height="70" fill="rgba(255,255,255,0.1)" rx="6"/>
  <text x="280" y="252" font-size="12" fill="white" font-weight="bold" text-anchor="middle">مساحة القرص</text>
  <text x="280" y="272" font-size="13" fill="#FFD700" font-family="monospace" font-weight="bold" text-anchor="middle">S = 5 × 5 × 3,14</text>
  <text x="280" y="292" font-size="14" fill="#10b981" font-family="monospace" font-weight="bold" text-anchor="middle">S = 78,5 cm²</text>

  <!-- O label -->
  <text x="178" y="156" font-size="13" fill="#FFD700" font-weight="bold">O</text>
</svg>