<svg viewBox="0 0 340 260" class="w-full max-w-[320px] mx-auto my-2" xmlns="http://www.w3.org/2000/svg">
  <rect x="0" y="0" width="340" height="260" fill="#2D8B4E" rx="8"/>

  <!-- Circle -->
  <circle cx="170" cy="120" r="90" fill="none" stroke="white" stroke-width="2"/>

  <!-- Center O -->
  <circle cx="170" cy="120" r="4" fill="#FFD700"/>

  <!-- Tangent line (D) -->
  <line x1="20" y1="211" x2="320" y2="211" stroke="#FF653F" stroke-width="2.5"/>

  <!-- Point H on circle (tangent point) -->
  <circle cx="170" cy="210" r="4" fill="white"/>

  <!-- Radius OH perpendicular to tangent -->
  <line x1="170" y1="120" x2="170" y2="210" stroke="#FFD700" stroke-width="2"/>

  <!-- Right angle marker at H -->
  <path d="M 170 195 L 185 195 L 185 210" fill="none" stroke="white" stroke-width="1.5"/>

  <!-- Labels -->
  <text x="156" y="138" font-size="14" fill="#FFD700" font-weight="bold">O</text>
  <text x="170" y="228" font-size="14" fill="white" font-weight="bold" text-anchor="middle">H</text>

  <!-- Line label D -->
  <text x="322" y="205" font-size="14" fill="#FF653F" font-weight="bold" text-anchor="middle">(D)</text>

  <!-- Radius label -->
  <text x="178" y="170" font-size="13" fill="#FFD700" font-weight="bold" text-anchor="middle">r</text>

  <!-- Perpendicular symbol label -->
  <text x="192" y="195" font-size="11" fill="white" opacity="0.9" text-anchor="middle">⊥</text>

  <!-- Bottom labels -->
  <text x="170" y="248" font-size="12" fill="white" opacity="0.9" text-anchor="middle">المماس (D) يتعامد مع الشعاع OH</text>
</svg>