<svg viewBox="0 0 320 280" class="w-full max-w-[300px] mx-auto my-2" xmlns="http://www.w3.org/2000/svg">
  <rect x="0" y="0" width="320" height="280" fill="#2D8B4E" rx="8"/>

  <!-- Disk (filled circle) -->
  <circle cx="160" cy="130" r="90" fill="rgba(255,255,255,0.15)" stroke="white" stroke-width="2.5"/>

  <!-- Center point O -->
  <circle cx="160" cy="130" r="4" fill="#FFD700"/>

  <!-- Point N inside disk -->
  <circle cx="200" cy="100" r="4" fill="#10b981"/>

  <!-- Radius line to point on circle -->
  <line x1="160" y1="130" x2="250" y2="130" stroke="#FFD700" stroke-width="2" stroke-dasharray="6 3"/>

  <!-- Radius to another point showing ON < r -->
  <line x1="160" y1="130" x2="200" y2="100" stroke="#10b981" stroke-width="2" stroke-dasharray="4 3"/>

  <!-- Labels -->
  <text x="145" y="148" font-size="14" fill="#FFD700" font-weight="bold" text-anchor="end">O</text>
  <text x="210" y="97" font-size="14" fill="#10b981" font-weight="bold">N</text>
  <text x="255" y="128" font-size="14" fill="white" font-weight="bold">r</text>

  <!-- Bottom labels -->
  <text x="160" y="240" font-size="12" fill="white" opacity="0.9" text-anchor="middle">(D) : ON ≤ r</text>
  <text x="160" y="258" font-size="11" fill="white" opacity="0.7" text-anchor="middle">النقطة N تنتمي إلى القرص</text>
</svg>