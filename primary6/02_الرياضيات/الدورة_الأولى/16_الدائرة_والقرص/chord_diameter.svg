<svg viewBox="0 0 360 300" class="w-full max-w-[340px] mx-auto my-2" xmlns="http://www.w3.org/2000/svg">
  <rect x="0" y="0" width="360" height="300" fill="#2D8B4E" rx="8"/>

  <!-- Circle -->
  <circle cx="180" cy="130" r="100" fill="none" stroke="white" stroke-width="2"/>

  <!-- Center O -->
  <circle cx="180" cy="130" r="4" fill="#FFD700"/>

  <!-- Chord AB (not through center) -->
  <line x1="115" y1="55" x2="263" y2="75" stroke="#10b981" stroke-width="2.5"/>
  <circle cx="115" cy="55" r="3" fill="#10b981"/>
  <circle cx="263" cy="75" r="3" fill="#10b981"/>

  <!-- Diameter EF (through center) -->
  <line x1="80" y1="130" x2="280" y2="130" stroke="#FF653F" stroke-width="2.5"/>
  <circle cx="80" cy="130" r="3" fill="#FF653F"/>
  <circle cx="280" cy="130" r="3" fill="#FF653F"/>

  <!-- Labels -->
  <text x="180" y="148" font-size="14" fill="#FFD700" font-weight="bold" text-anchor="middle">O</text>

  <!-- Chord labels -->
  <text x="100" y="47" font-size="13" fill="#10b981" font-weight="bold">A</text>
  <text x="286" y="70" font-size="13" fill="#10b981" font-weight="bold">B</text>

  <!-- Diameter labels -->
  <text x="68" y="127" font-size="13" fill="#FF653F" font-weight="bold">E</text>
  <text x="286" y="127" font-size="13" fill="#FF653F" font-weight="bold">F</text>

  <!-- Legend -->
  <line x1="40" y1="240" x2="70" y2="240" stroke="#10b981" stroke-width="2.5"/>
  <text x="100" y="244" font-size="13" fill="white" text-anchor="middle">[AB] وتر</text>

  <line x1="40" y1="264" x2="70" y2="264" stroke="#FF653F" stroke-width="2.5"/>
  <text x="145" y="268" font-size="13" fill="white" text-anchor="middle">[EF] قطر (يمر من المركز)</text>
</svg>